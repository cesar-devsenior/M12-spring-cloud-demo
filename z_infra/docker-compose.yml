services:

  # Servidores de monitoreo de metricas
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./metricas/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

  # Servidores rastreo de eventos de log
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Deshabilitado para entorno local de desarrollo
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.0
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5000:5000" # Puerto TCP para recibir logs de Spring Boot
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  # Trazas
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Interfaz web de Jaeger para ver las trazas
      - "4317:4317"   # Puerto OTLP gRPC (OpenTelemetry)
      - "4318:4318"   # Puerto OTLP HTTP (OpenTelemetry)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # Authentication & Authorization
  keycloak-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --hostname=http://localhost:18081
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "18081:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    